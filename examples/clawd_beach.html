<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Clawd · 沙滩</title>
  <style>
    body { background: #0a1828; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
    p { color: #2a3a5a; font-size:11px; font-family:monospace; margin-top:8px; letter-spacing:3px; }
  </style>
</head>
<body>
  <canvas id="c" width="400" height="300"></canvas>
  <p>CLAWD · 沙滩</p>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d'); ctx.imageSmoothingEnabled = false;
const W = 200, H = 150;
const buf = document.createElement('canvas'); buf.width=W; buf.height=H;
const g = buf.getContext('2d'); g.imageSmoothingEnabled = false;

const S=3, FOOT_Y=116;
const CX=Math.floor(85-7.5*S), CY=FOOT_Y-15*S;
const gx=x=>CX+x*S, gy=y=>CY+y*S;
const C={body:'#DE886D',eye:'#000000',shadow:'rgba(0,0,0,0.35)'};
function rect(x,y,w,h,c){ g.fillStyle=c; g.fillRect(Math.floor(x),Math.floor(y),w,h); }

const P={
  sky0:'#4a9ad4', sky1:'#6ab8e8', sky2:'#8dcff0',
  sun:'#ffe060', sunGlow:'#ffcc20',
  ocean0:'#1a6090', ocean1:'#2070a8', ocean2:'#3888c0', foam:'#b8dff0',
  sand0:'#d4b060', sand1:'#c8a040', sand2:'#b89030',
  umbrella:'#e03030', umbrella2:'#e8e030', umbrellaPole:'#c8a870',
  seagull:'#f0f0f0',
};

let _s=55213; const rand=()=>{ _s=(_s*1664525+1013904223)&0x7fffffff; return _s/0x7fffffff; };

// Seagulls
const GULLS=[{x:170,y:22,sp:0.18},{x:140,y:35,sp:0.14},{x:155,y:14,sp:0.22}];

// Wave offsets
const WAVES=[{y:88,amp:2.5,freq:0.08,sp:0.7,c:P.ocean1},
             {y:93,amp:2,freq:0.07,sp:0.5,c:P.ocean0},
             {y:98,amp:1.5,freq:0.06,sp:0.4,c:P.ocean0}];

// Beach ball physics
const ball = { x:140, y:FOOT_Y, vx:-1.2, vy:0, r:5 };
const GRAVITY=0.18, BOUNCE=0.62;

function updateBall(dt){
  ball.vy += GRAVITY*dt;
  ball.x  += ball.vx*(dt/60)*60;
  ball.y  += ball.vy*(dt/60)*60;
  if(ball.y >= FOOT_Y){ ball.y=FOOT_Y; ball.vy=-Math.abs(ball.vy)*BOUNCE; if(Math.abs(ball.vy)<0.8) ball.vy=-2.5; }
  if(ball.x < 10){ ball.x=10; ball.vx=Math.abs(ball.vx); }
  if(ball.x > W-10){ ball.x=W-10; ball.vx=-Math.abs(ball.vx); }
}

function drawBall(){
  const bx=Math.floor(ball.x), by=Math.floor(ball.y);
  rect(bx-5,by-5,10,10,'#e83030');   // red base
  rect(bx-3,by-5, 6, 2,'#e8e030');   // yellow stripe top
  rect(bx-5,by-1, 10,3,'#3088e0');   // blue stripe mid
  rect(bx-3,by+3, 6, 2,'#e8e030');   // yellow stripe bot
  // highlight
  g.globalAlpha=0.5; rect(bx-2,by-4,3,2,'#fff'); g.globalAlpha=1;
  // shadow
  g.globalAlpha=0.25; rect(bx-4,FOOT_Y+1,8,2,'#000'); g.globalAlpha=1;
}

let bT=0,blinkT=600,nextBlink=180,eyeDx=0,lookDx=0,nextLook=240;
function drawClawd(dt){
  bT+=0.03*dt; blinkT+=dt; nextBlink-=dt;
  if(nextBlink<0){nextBlink=(2+Math.random()*3.5)*60;blinkT=0;}
  nextLook-=dt;
  if(nextLook<0){nextLook=(1.8+Math.random()*3)*60;lookDx=(Math.random()-.5)*4;}
  eyeDx+=(lookDx-eyeDx)*0.04*dt;
  const breathe=1+Math.sin(bT)*0.014;
  rect(gx(2),gy(15.3),11*S,2,C.shadow);
  rect(gx(3),gy(13),S,S*2,C.body);rect(gx(5),gy(13),S,S*2,C.body);
  rect(gx(9),gy(13),S,S*2,C.body);rect(gx(11),gy(13),S,S*2,C.body);
  const tH=Math.round(7*S*breathe),tY=Math.floor(gy(6))+(7*S-tH);
  rect(gx(2),tY,11*S,tH,C.body);
  // Left arm waves when ball is near, right arm relaxed
  const ballNear = Math.abs(ball.x - (CX+7.5*S)) < 38;
  const waveAng = ballNear ? Math.sin(t*6)*0.9-0.9 : 0;
  g.save();g.translate(Math.floor(gx(1)),Math.floor(gy(10)));g.rotate(waveAng);rect(-S,-S,S*2,S*2,C.body);g.restore();
  g.save();g.translate(Math.floor(gx(14)),Math.floor(gy(10)));rect(-S,-S,S*2,S*2,C.body);g.restore();
  rect(gx(3),Math.floor(gy(8)),S*3,S,P.ocean0);
  rect(gx(9),Math.floor(gy(8)),S*3,S,P.ocean0);
  rect(gx(6),Math.floor(gy(8)),S,1,'#448');
  const blinkSc=blinkT<0.07*60?0.05:1,eyeH=Math.max(1,Math.round(S*2*blinkSc));
  const edx=Math.floor(eyeDx),ey=Math.floor(gy(8))+(S*2-eyeH);
  rect(gx(4)+edx,ey,S,eyeH,C.eye);rect(gx(10)+edx,ey,S,eyeH,C.eye);
}

function drawScene(t,dt){
  // Sky gradient (3 bands)
  rect(0,0,W,40,P.sky0); rect(0,40,W,35,P.sky1); rect(0,75,W,20,P.sky2);

  // Sun
  const sunGlow=0.7+0.3*Math.sin(t*0.6);
  g.globalAlpha=sunGlow*0.3;
  for(let r=20;r>0;r-=4){g.fillStyle=P.sunGlow;g.fillRect(164-r,8-r,r*2,r*2);}
  g.globalAlpha=1;
  rect(158,4,12,12,P.sun);

  // Seagulls (V shapes drifting left)
  for(const gu of GULLS){
    gu.x-=gu.sp*dt/60*60;
    if(gu.x<-10)gu.x=W+10;
    const wing=Math.sin(t*4+gu.sp*10)*2;
    g.fillStyle=P.seagull;
    g.fillRect(Math.floor(gu.x)-4,Math.floor(gu.y+wing)-1,3,1);
    g.fillRect(Math.floor(gu.x)+2,Math.floor(gu.y-wing)-1,3,1);
  }

  // Clouds (2 simple ones)
  const cx1=((t*8)%230)|0, cx2=((t*6+120)%240)|0;
  g.fillStyle='rgba(240,248,255,0.55)';
  g.fillRect(cx1,12,18,6); g.fillRect(cx1+4,8,10,5); g.fillRect(cx1-4,14,8,4);
  g.fillRect(cx2,28,22,6); g.fillRect(cx2+5,24,12,5);

  // Ocean
  rect(0,82,W,FOOT_Y-82,P.ocean2);
  for(const w of WAVES){
    for(let wx=0;wx<W;wx+=2){
      const wy=w.y+Math.sin(wx*w.freq+t*w.sp)*w.amp;
      rect(wx,wy,2,3,w.c);
    }
  }
  // Foam top edge
  for(let wx=0;wx<W;wx+=4){
    const fy=84+Math.sin(wx*0.1+t*0.9)*2;
    g.globalAlpha=0.5+0.5*Math.sin(t*2+wx*0.2);
    rect(wx,fy,3,1,P.foam);
  }
  g.globalAlpha=1;

  // Sand
  rect(0,FOOT_Y,W,H-FOOT_Y,P.sand0);
  rect(0,FOOT_Y,W,4,P.sand1);
  // Sand texture
  for(let sx=0;sx<W;sx+=6) rect(sx,FOOT_Y+2+(sx%3),2,1,P.sand2);

  // Beach umbrella (over Clawd)
  rect(74,70,2,50,P.umbrellaPole);
  rect(56,68,38,4,P.umbrella); rect(58,64,34,4,P.umbrella2);
  rect(60,60,30,4,P.umbrella); rect(62,56,26,4,P.umbrella2);
  rect(64,52,22,4,P.umbrella); rect(66,48,18,4,P.umbrella2);
  rect(68,46,14,3,P.umbrella);
}

let lastTs=0,t=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/(1000/60),3);lastTs=ts;t+=dt/60;
  drawScene(t,dt);
  updateBall(dt);
  drawBall();
  drawClawd(dt);
  ctx.drawImage(buf,0,0,W,H,0,0,400,300);
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{lastTs=ts;requestAnimationFrame(loop);});
</script>
</body>
</html>
